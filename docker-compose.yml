services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mmm_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mmm_platform
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mmm_platform
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  uploads:
