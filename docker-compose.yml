services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mmm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mmm
      UPLOAD_DIR: /app/uploads
    depends_on:
      - postgres

volumes:
  pgdata:
  uploads:
